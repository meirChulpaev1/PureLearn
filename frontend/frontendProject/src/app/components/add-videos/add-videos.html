<form (ngSubmit)="postVideo()">
  <h2>Enter video details</h2>
        <div *ngIf="errorMessage()" class="error-banner">
      <span>⚠️</span>
      {{ errorMessage() }}
    </div>
    <input type="text" [(ngModel)]="video.title" name="title" placeholder="title" required>
    <input type="url" [(ngModel)]="video.url" name="url" placeholder="url" required>
<select [(ngModel)]="video.category" name="category" required>
  <option value="" disabled selected hidden>Select Category</option>
  <option *ngFor="let i of categories" [value]="i.value">
    {{i.label}}
  </option>
</select>

<button type="submit">
  <div class="svg-wrapper-1">
    <div class="svg-wrapper">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        width="24"
        height="24"
      >
        <path fill="none" d="M0 0h24v24H0z"></path>
        <path fill="currentColor"d="M1.946 9.315c-.522-.174-.527-.455.01-.634l19.087-6.362c.529-.176.832.12.684.638l-5.454 19.086c-.15.529-.455.547-.679.045L12 14l6-8-8 6-8.054-2.685z"
        ></path>
      </svg>
    </div>
  </div>
  <span>add video</span>
</button>
</form>

<form>
  <h2>See if this effort is even worth it to you.</h2>
  <input type="url" [(ngModel)]="urlApiTest" name="url" placeholder="url" required>
  <button type="submit" (click)="checkApi()">
  <div class="svg-wrapper-1">
    <div class="svg-wrapper">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        width="24"
        height="24"
      >
        <path fill="none" d="M0 0h24v24H0z"></path>
        <path fill="currentColor"d="M1.946 9.315c-.522-.174-.527-.455.01-.634l19.087-6.362c.529-.176.832.12.684.638l-5.454 19.086c-.15.529-.455.547-.679.045L12 14l6-8-8 6-8.054-2.685z"
        ></path>
      </svg>
    </div>
  </div>
  <span>Check</span>
</button>

  <h3 *ngIf="isGood() === true" class="status-msg success">✅ There's a chance it's okay</h3>
  <h3 *ngIf="isGood() === false" class="status-msg error">❌ The manager will not approve it.</h3>
  
</form>
