<div *ngIf="!authService.isLoggedIn()">
  <br>
</div>
<div class="container">
  <input checked="" class="checkbox" type="checkbox">
  <div class="mainbox">
    <div class="iconContainer">
      <svg viewBox="0 0 512 512" height="1em" xmlns="http://www.w3.org/2000/svg" class="search_icon">
        <path
          d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z">
        </path>
      </svg>
    </div>
    <input class="search_input" type="text" [ngModel]="searchQuery()" (input)="onSearchChange($event)"
      placeholder="Search">
  </div>
</div>
<br />
<div class="home-container">
  <div *ngIf="isLoading()" class="loader">
    <p>Loading videos...</p>
  </div>
  <!-- <div class="search-bar" *ngIf="!isLoading()">
    <input type="text" [ngModel]="searchQuery()" (input)="onSearchChange($event)" placeholder="Search">

  </div> -->

  <div class="video-grid" *ngIf="!isLoading()">
    <div *ngFor="let video of filteredVideos()" class="video-card">
      <h3>{{ video.title }}</h3>

      <iframe width="100%" height="250" [src]="getSafeUrl(video.url)" frameborder="0" allowfullscreen>
      </iframe>
      <h4>category - {{video.category_display}}</h4>

      <div class="card-footer">

        <div *ngIf="authService.isAdmin() && authService.isLoggedIn() " class="card-del">
          <button (click)="del(video.id)" class="del-b">🗑️</button>
        </div>

        <div *ngIf="authService.isLoggedIn()" class="like-container">
          <button *ngIf="!video.is_favorite" (click)="likeVideo(video)" class="like-btn">🤍</button>
          <button *ngIf="video.is_favorite" (click)="unLikeVideo(video)" class="like-btn">❤️</button>
        </div>

      </div>
    </div>
  </div>

  <div *ngIf="!isLoading() && filteredVideos().length === 0">
    <p>No videos found. Start by uploading some!</p>
  </div>
<div class="divButton" *ngIf="authService.isLoggedIn()">
  <button (click)="addVideo()" class="buttonAddvideo">
    <span class="plus-icon">+</span>
  </button>
</div>
</div>
