<div class="home-container">
  <div *ngIf="isLoading()" class="loader">
    <p>Loading videos...</p>
  </div>

  <div class="video-grid" *ngIf="!isLoading()">
    <div *ngFor="let item of videos()" class="video-card">
      <h3>{{ item.video.title }}</h3>
      
      <iframe width="100%" height="250"
              [src]="getSafeUrl(item.video.url)"
              frameborder="0"
              allowfullscreen>
      </iframe>
      <div class="card-footer">
        <button (click)="unLikeVideo(item.video)" class="like-btn"> ❤️</button>
      </div>

    </div>
  </div>

    <div *ngIf="!isLoading() && videos().length === 0">
    <p>No videos found. Go to the homepage and give and start learning something.</p>
  </div>
</div>
